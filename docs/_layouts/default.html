<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: "Neko.js - Adopt a cat on your website" }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <header class="site-header">
            <div class="header-content">
                <img src="{{ '/assets/images/neko-awake.ico' | relative_url }}" alt="Neko" class="pixel-cat">
                <h1 class="site-title">Neko.js</h1>
            </div>
            <p class="tagline">adopt a cat on your website</p>
        </header>

        <main class="content">
            {{ content }}
        </main>

        <footer class="site-footer">
            <div class="footer-divider"></div>
            <p>made with love • original by Masayuki Koba • ported by <a href="https://github.com/louisabraham">Louis
                    Abraham</a></p>
        </footer>
    </div>
</body>

</html>
